<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test</title>
</head>
<body style="background:#000;color:#fff;font-family:sans-serif;padding:20px;">
<h1 id="title">Page Loaded</h1>
<button onclick="testClick()" style="background:#f0b90b;color:#000;padding:12px 24px;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;">Test Button</button>
<div id="result" style="margin-top:20px;font-size:1.2rem;"></div>
<script>
document.getElementById('title').textContent = 'JS is WORKING';
function testClick() {
  document.getElementById('result').textContent = 'Button clicked! JS works perfectly.';
  document.getElementById('result').style.color = '#0ecb81';
}
</script>
</body>
</html>
